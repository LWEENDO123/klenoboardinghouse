<!-- boardinghouse-details.html -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Boarding House Details</title>
    <style>
        body { font-family: Arial, sans-serif; background-color: #f4f4f4; margin: 0; padding: 0; display: flex; flex-direction: column; align-items: center; }
        .container { width: 100%; max-width: 375px; background-color: white; overflow: hidden; }
        .main-image { width: 100%; height: auto; display: block; }
        .info-section { padding: 15px; }
        .name { font-size: 24px; font-weight: bold; margin: 0; }
        .location { font-size: 14px; color: #666; margin: 5px 0 20px; }
        .room-types-title { font-size: 18px; font-weight: bold; margin-bottom: 15px; }
        .room-type { display: flex; align-items: flex-start; margin-bottom: 15px; background-color: #f8f9fa; border-radius: 8px; padding: 10px; }
        .status-badge { padding: 5px 10px; color: white; font-size: 12px; border-radius: 25px; margin-right: 10px; flex-shrink: 0; }
        .available { background-color: #28a745; }
        .unavailable { background-color: #dc3545; }
        .not-supported { background-color: #6c757d; }
        .room-image { width: 120px; height: 80px; object-fit: cover; border-radius: 8px; margin-right: 10px; }
        .room-details { flex: 1; }
        .room-label { font-size: 14px; font-weight: bold; margin-bottom: 5px; }
        .room-price { font-size: 14px; color: #333; }
        .amenities-section { padding: 15px; border-top: 1px solid #eee; }
        .amenities-title { font-size: 18px; font-weight: bold; margin-bottom: 15px; }
        .icons { display: flex; justify-content: flex-end; gap: 15px; }
        .icon { width: 30px; height: 30px; border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer; }
        .call-icon { background-color: #28a745; color: white; }
        .back-icon { background-color: #000; color: white; font-size: 20px; }
        .share-icon { background-color: #000; color: white; font-size: 20px; }
        .location-section { padding: 15px; border-top: 1px solid #eee; }
        .location-title { font-size: 18px; font-weight: bold; margin-bottom: 15px; }
        .location-buttons { display: flex; justify-content: space-around; }
        .location-button { padding: 10px 20px; background-color: #007bff; color: white; border: none; border-radius: 4px; cursor: pointer; font-size: 14px; }
        .location-button:hover { background-color: #0056b3; }
        .premium-note { font-size: 12px; color: #dc3545; text-align: center; margin-top: 10px; }
        .coordinates { margin-top: 15px; padding: 10px; background-color: #f8f9fa; border-radius: 4px; display: none; }
        .coordinates.active { display: block; }
        .loading { text-align: center; padding: 20px; color: #666; }
    </style>
</head>
<body>
    <div class="container">
        <img class="main-image" id="main-image" src="" alt="Boarding House">
        <div class="info-section">
            <h1 class="name" id="name"></h1>
            <p class="location" id="location"></p>
            <h2 class="room-types-title">ROOM TYPES</h2>
            <div id="room-types-container">
                <!-- Room types will be populated here -->
            </div>
        </div>
        <div class="amenities-section">
            <h2 class="amenities-title">Amenities</h2>
            <div id="amenities-list">
                <!-- Amenities will be populated here -->
            </div>
            <div class="icons">
                <div class="icon call-icon" onclick="alert('Call landlord')">☎️</div>
                <div class="icon back-icon" onclick="history.back()">←</div>
                <div class="icon share-icon" onclick="alert('Share link')">🔗</div>
            </div>
        </div>
        <div class="location-section">
            <h2 class="location-title">Location</h2>
            <div class="location-buttons">
                <button class="location-button" onclick="fetchCoordinates('gps')">Get GPS</button>
                <button class="location-button" onclick="fetchCoordinates('yango')">Get Yango</button>
            </div>
            <div id="coordinates-display" class="coordinates">
                <p id="coord-text"></p>
            </div>
            <p class="premium-note">Note: Coordinates access requires premium subscription.</p>
        </div>
    </div>
    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const university = urlParams.get('university');
        const studentId = urlParams.get('student_id');
        const boardinghouseId = urlParams.get('boardinghouse_id');
        const token = localStorage.getItem('access_token');

        async function fetchBoardingHouseDetails() {
            const roomTypesContainer = document.getElementById('room-types-container');
            const amenitiesList = document.getElementById('amenities-list');
            roomTypesContainer.innerHTML = '<p class="loading">Loading...</p>';
            amenitiesList.innerHTML = '<p class="loading">Loading...</p>';

            try {
                const response = await fetch(`http://localhost:8000/home/${university}/${studentId}/${boardinghouseId}`, {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                if (!response.ok) throw new Error('Failed to fetch details');
                const data = await response.json();

                document.getElementById('main-image').src = data.images[0] || 'https://via.placeholder.com/375x200?text=Boarding+House';
                document.getElementById('name').textContent = data.name;
                document.getElementById('location').textContent = `Location: ${data.location || 'N/A'}`;

                const roomTypes = [
                    { key: 'sharedroom_4', label: '4 shared room', priceKey: 'price_4', imgIndex: 1 },
                    { key: 'sharedroom_3', label: '3 shared room', priceKey: 'price_3', imgIndex: 2 },
                    { key: 'sharedroom_2', label: '2 shared room', priceKey: 'price_2', imgIndex: 3 },
                    { key: 'singleroom', label: 'single room', priceKey: 'price_1', imgIndex: 4 }
                ];

                roomTypesContainer.innerHTML = '';
                roomTypes.forEach(type => {
                    const status = data[type.key];
                    if (status && status !== 'not_supported') {
                        const div = document.createElement('div');
                        div.className = 'room-type';
                        let statusClass = 'status-badge ';
                        if (status === 'available') statusClass += 'available';
                        else if (status === 'unavailable') statusClass += 'unavailable';
                        else statusClass += 'not-supported';

                        const imgSrc = data.images[type.imgIndex] || data.images[0] || 'https://via.placeholder.com/120x80?text=Room';
                        div.innerHTML = `
                            <span class="${statusClass}">${status}</span>
                            <img class="room-image" src="${imgSrc}" alt="${type.label}">
                            <div class="room-details">
                                <p class="room-label">${type.label}</p>
                                <p class="room-price">${data[type.priceKey] || 'N/A'}</p>
                            </div>
                        `;
                        roomTypesContainer.appendChild(div);
                    }
                });

                amenitiesList.innerHTML = '';
                if (data.amenities && data.amenities.length > 0) {
                    data.amenities.forEach(amenity => {
                        const p = document.createElement('p');
                        p.textContent = amenity;
                        amenitiesList.appendChild(p);
                    });
                } else {
                    amenitiesList.innerHTML = '<p>No amenities listed</p>';
                }
            } catch (error) {
                roomTypesContainer.innerHTML = `<p class="loading">Error: ${error.message}</p>`;
                amenitiesList.innerHTML = `<p class="loading">Error: ${error.message}</p>`;
            }
        }

        async function fetchCoordinates(type) {
            try {
                const response = await fetch(`http://localhost:8000/home/coordinates/${studentId}/${boardinghouseId}`, {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                if (!response.ok) throw new Error('Failed to fetch coordinates');
                const data = await response.json();
                const display = document.getElementById('coordinates-display');
                const text = document.getElementById('coord-text');
                if (type === 'gps') {
                    text.textContent = `GPS Coordinates: ${data.GPS_coordinates || 'N/A'}`;
                } else if (type === 'yango') {
                    text.textContent = `Yango Coordinates: ${data.yango_coordinates || 'N/A'}`;
                }
                display.classList.add('active');
            } catch (error) {
                if (error.message.includes('403')) {
                    alert('Premium access required');
                } else {
                    alert(`Error fetching coordinates: ${error.message}`);
                }
            }
        }

        window.onload = fetchBoardingHouseDetails;
    </script>
</body>
</html>

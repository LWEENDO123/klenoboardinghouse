<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login</title>
<style>
    body { font-family: Arial, sans-serif; background-color: #f4f4f4; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
    .container { background-color: white; padding: 30px; border-radius: 8px; box-shadow: 0 0 10px rgba(0,0,0,0.1); width: 100%; max-width: 400px; }
    h2 { text-align: center; margin-bottom: 20px; }
    label { display: block; margin-bottom: 8px; font-weight: bold; }
    input[type="email"], input[type="password"], input[type="text"] { width: 100%; padding: 10px; margin-bottom: 15px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; }
    button { width: 100%; padding: 10px; background-color: #007bff; color: white; border: none; border-radius: 4px; cursor: pointer; font-size: 16px; }
    button:hover { background-color: #0056b3; }
    .role-selection { margin-bottom: 15px; text-align: center; }
    .role-selection label { display: inline-block; margin: 0 10px; }
    .signup-link { text-align: center; margin-top: 15px; }
    .signup-link a { color: #007bff; text-decoration: none; }
    .signup-link a:hover { text-decoration: underline; }
    .error { color: #dc3545; text-align: center; margin-top: 10px; display: none; }
</style>
</head>
<body>
<div class="container">
    <h2>Login</h2>
    <form id="login-form" method="POST" action="/login">
        <div class="role-selection">
            <label><input type="radio" name="role" value="student" checked onclick="toggleUniversity(true)"> Student</label>
            <label><input type="radio" name="role" value="landlord" onclick="toggleUniversity(false)"> Landlord</label>
        </div>

        <div id="university-wrapper">
            <label for="university">University (required for students):</label>
            <input type="text" id="university" name="university" placeholder="e.g., CUZ">
        </div>

        <label for="email">Email:</label>
        <input type="email" id="email" name="email" required>

        <label for="password">Password:</label>
        <input type="password" id="password" name="password" required>

        <button type="submit">Login</button>
        <div class="error" id="error-message"></div>
    </form>
    <div class="signup-link">
        Don't have an account? 
        <a href="/signup/student">Sign up as Student</a> or 
        <a href="/signup/landlord">Sign up as Landlord</a>
    </div>
</div>

<script>
function toggleUniversity(show) {
    const wrapper = document.getElementById('university-wrapper');
    const input = document.getElementById('university');
    wrapper.style.display = show ? 'block' : 'none';
    input.required = show;
    if (!show) input.value = '';
}
toggleUniversity(true);
</script>
</body>
</html>

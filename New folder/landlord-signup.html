<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Landlord Signup</title>
    <style>
        body { font-family: Arial, sans-serif; background-color: #f4f4f4; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .container { background-color: white; padding: 30px; border-radius: 8px; box-shadow: 0 0 10px rgba(0,0,0,0.1); width: 100%; max-width: 400px; }
        h2 { text-align: center; margin-bottom: 20px; }
        label { display: block; margin-bottom: 8px; font-weight: bold; }
        input { width: 100%; padding: 10px; margin-bottom: 15px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; }
        button { width: 100%; padding: 10px; background-color: #28a745; color: white; border: none; border-radius: 4px; cursor: pointer; font-size: 16px; }
        button:hover { background-color: #218838; }
        .login-link { text-align: center; margin-top: 15px; }
        .login-link a { color: #007bff; text-decoration: none; }
        .login-link a:hover { text-decoration: underline; }
        .error { color: #dc3545; text-align: center; margin-top: 10px; display: none; }
    </style>
</head>
<body>
    <div class="container">
        <h2>Landlord Signup</h2>
        <form id="signup-form" action="/signup/landlord" method="POST">
            <label for="first_name">First Name:</label>
            <input type="text" id="first_name" name="first_name" pattern="^[A-Za-z]+$" maxlength="25" required>
            <label for="last_name">Last Name:</label>
            <input type="text" id="last_name" name="last_name" pattern="^[A-Za-z]+$" maxlength="25" required>
            <label for="boarding_house">Boarding House Name:</label>
            <input type="text" id="boarding_house" name="boarding_house" required>
            <label for="email">Email:</label>
            <input type="email" id="email" name="email" required>
            <label for="password">Password:</label>
            <input type="password" id="password" name="password" minlength="8" maxlength="25" required>
            <label for="phone_number">Phone Number:</label>
            <input type="tel" id="phone_number" name="phone_number" pattern="^\d+$" maxlength="10" required>
            <label for="university">University (optional):</label>
            <input type="text" id="university" name="university">
            <button type="submit">Sign Up</button>
            <div class="error" id="error-message"></div>
        </form>
        <div class="login-link">
            Already have an account? <a href="/login">Login</a>
        </div>
    </div>
    <script>
        document.getElementById('signup-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const payload = {
                first_name: document.getElementById('first_name').value,
                last_name: document.getElementById('last_name').value,
                boarding_house: document.getElementById('boarding_house').value,
                email: document.getElementById('email').value,
                password: document.getElementById('password').value,
                phone_number: document.getElementById('phone_number').value,
                university: document.getElementById('university').value || null
            };
            try {
                const response = await fetch('http://localhost:8000/signup/landlord', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });
                const data = await response.json();
                if (response.ok) {
                    alert('Signup successful! Please login.');
                    window.location.href = '/login';
                } else {
                    document.getElementById('error-message').textContent = data.detail || 'Signup failed';
                    document.getElementById('error-message').style.display = 'block';
                }
            } catch (error) {
                document.getElementById('error-message').textContent = 'Error: ' + error.message;
                document.getElementById('error-message').style.display = 'block';
            }
        });
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Klano</title>
    <style>
        body {
            margin: 0;
            font-family: 'Arial', sans-serif;
            background-color: #f5f5f5;
        }

        .container {
            display: flex;
            height: 100vh;
        }

        .sidebar {
            width: 250px;
            background-color: #2c3e50;
            color: white;
            padding: 20px 0;
            box-shadow: 2px 0 5px rgba(0, 0, 0, 0.1);
        }

        .sidebar-item {
            padding: 15px 20px;
            color: white;
            cursor: pointer;
            transition: background-color 0.3s;
        }

        .sidebar-item:hover {
            background-color: #34495e;
        }

        .main-content {
            flex-grow: 1;
            background-color: #ecf0f1;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .brand-header {
            background-color: #66D4FF;
            padding: 10px 20px;
            font-size: 28px;
            color: white;
            margin-bottom: 20px;
            text-align: center;
            border-radius: 5px;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.1);
        }

        .search-bar {
            margin-bottom: 20px;
            width: 100%;
            max-width: 800px;
            display: flex;
            gap: 10px;
        }

        .search-input {
            flex-grow: 1;
            padding: 12px 20px;
            border: none;
            border-radius: 25px;
            font-size: 16px;
            background-color: white;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.1);
            color: #333;
        }

        .filter-btn {
            padding: 12px 20px;
            border: none;
            border-radius: 25px;
            background-color: #66D4FF;
            color: white;
            font-size: 16px;
            cursor: pointer;
            transition: background-color 0.3s;
        }

        .filter-btn:hover {
            background-color: #c0392b;
        }

        .property-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
            width: 100%;
            max-width: 1200px;
            padding: 20px 0;
        }

        .property-card {
            background-color: white;
            border-radius: 10px;
            overflow: hidden;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
            transition: transform 0.3s;
        }

        .property-card:hover {
            transform: translateY(-5px);
        }

        .property-image {
            width: 100%;
            height: 150px;
            background-color: #bdc3c7;
            position: relative;
        }

        .property-details {
            padding: 15px;
            color: #333;
        }

        .property-details h3 {
            margin: 0 0 10px 0;
            font-size: 18px;
        }

        .property-details p {
            margin: 5px 0;
            font-size: 14px;
        }

        .price {
            font-weight: bold;
            color: #e74c3c;
        }

        .loading {
            text-align: center;
            font-size: 18px;
            color: #7f8c8d;
        }

        .no-boarding-houses {
            text-align: center;
            font-size: 18px;
            color: #e74c3c;
            padding: 20px;
        }

        .error {
            text-align: center;
            color: #e74c3c;
            font-size: 16px;
        }

        .auth-message {
            text-align: center;
            margin-top: 10px;
            color: #e74c3c;
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Sidebar -->
        <div class="sidebar">
            <div class="sidebar-item">Home</div>
            <div class="sidebar-item">AVAILABLE</div>
            <div class="sidebar-item">PINNED</div>
            <div class="sidebar-item">EVENT</div>
            <div class="sidebar-item">STORE</div>
            <div class="sidebar-item">PROXIY LOCATION</div>
            <a href="#" class="sidebar-item" id="addBoardingHouseBtn">Add Boarding House</a>
        </div>

        <!-- Main Content -->
        <div class="main-content">
            <!-- Brand Header -->
            <div class="brand-header">KLENO</div>

            <!-- Search Bar with Filter -->
            <div class="search-bar">
                <input type="text" placeholder="Search properties..." class="search-input" id="searchInput">
                <button class="filter-btn" id="filterBtn">Filter</button>
            </div>

            <!-- Property Grid -->
            <div class="property-grid" id="propertyGrid">
                <div class="loading" id="loading">Loading properties...</div>
                <div class="no-boarding-houses" id="noBoardingHouses" style="display: none;">No boarding houses found.</div>
                <div class="error" id="error" style="display: none;"></div>
            </div>

            <!-- Authentication Message -->
            <div class="auth-message" id="authMessage" style="display: none;"></div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/jwt-decode@3.1.2/build/jwt-decode.min.js"></script>
    <script>
        // API Base URL (adjust based on your FastAPI server)
        const API_URL = 'http://localhost:8000';

        // Fetch boarding houses on page load
        document.addEventListener('DOMContentLoaded', () => {
            const urlParams = new URLSearchParams(window.location.search);
            const university = urlParams.get('university') || 'CUZ'; // Use query param or default to CUZ
            fetchBoardingHouses(university);
            checkUserRole();
        });

        // Check user role and manage button visibility
        function checkUserRole() {
            const token = localStorage.getItem('token');
            const authMessage = document.getElementById('authMessage');
            const addButton = document.getElementById('addBoardingHouseBtn');

            if (token) {
                try {
                    const payload = jwt_decode(token);
                    console.log('Payload:', payload);
                    if (payload.role === 'landlord') {
                        addButton.style.display = 'block';
                        authMessage.style.display = 'none';
                    } else {
                        addButton.style.display = 'none';
                        authMessage.textContent = 'You must be a landlord to add a boarding house. Log in as a landlord or sign up.';
                        authMessage.style.display = 'block';
                    }
                } catch (e) {
                    console.error('Error decoding token:', e);
                    addButton.style.display = 'none';
                    authMessage.textContent = 'Invalid session. Please log in again.';
                    authMessage.style.display = 'block';
                }
            } else {
                addButton.style.display = 'none';
                authMessage.textContent = 'You are not logged in. <a href="/login">Log in</a> to access more features.';
                authMessage.style.display = 'block';
            }
        }

        // Fetch boarding houses from API
        async function fetchBoardingHouses(university) {
            const loading = document.getElementById('loading');
            const noBoardingHouses = document.getElementById('noBoardingHouses');
            const error = document.getElementById('error');
            const propertyGrid = document.getElementById('propertyGrid');

            loading.style.display = 'block';
            noBoardingHouses.style.display = 'none';
            error.style.display = 'none';
            propertyGrid.innerHTML = '';

            try {
                const response = await fetch(`${API_URL}/home/${university}/list`, {
                    headers: { 'Authorization': `Bearer ${localStorage.getItem('token')}` }
                });
                if (!response.ok) throw new Error('Failed to fetch boarding houses');
                const data = await response.json();

                if (data.length === 0) {
                    noBoardingHouses.style.display = 'block';
                } else {
                    data.forEach(boardinghouse => {
                        const card = document.createElement('div');
                        card.className = 'property-card';
                        card.innerHTML = `
                            <div class="property-image"></div>
                            <div class="property-details">
                                <h3>${boardinghouse.name}</h3>
                                <p>Location: ${boardinghouse.location}</p>
                                <p>Gender: ${boardinghouse.gender || 'Not specified'}</p>
                                <p class="price">Price: N/A</p>
                            </div>
                        `;
                        propertyGrid.appendChild(card);
                    });
                }
            } catch (err) {
                error.textContent = `Error: ${err.message}`;
                error.style.display = 'block';
            } finally {
                loading.style.display = 'none';
            }
        }

        // Add interactivity for sidebar
        document.querySelectorAll('.sidebar-item').forEach(item => {
            item.addEventListener('click', (e) => {
                const addButton = document.getElementById('addBoardingHouseBtn');
                if (item !== addButton) {
                    e.preventDefault(); // Prevent default for non-link items
                    alert(`Navigated to ${item.textContent}`);
                }
            });
        });

        // Handle Add Boarding House button click with token
        document.getElementById('addBoardingHouseBtn').addEventListener('click', async (e) => {
            e.preventDefault();
            const token = localStorage.getItem('token');
            if (!token) {
                alert('Please log in as a landlord.');
                window.location.href = '/login';
                return;
            }

            try {
                const response = await fetch(`${API_URL}/add-boardinghouse`, {
                    method: 'GET',
                    headers: {
                        'Authorization': `Bearer ${token}`,
                        'Content-Type': 'application/json'
                    }
                });
                if (response.ok) {
                    const text = await response.text();
                    const parser = new DOMParser();
                    const doc = parser.parseFromString(text, 'text/html');
                    document.open();
                    document.write(doc.documentElement.outerHTML);
                    document.close();
                } else {
                    const error = await response.json();
                    alert(`Error: ${error.detail || 'Authentication failed'}`);
                }
            } catch (err) {
                console.error('Fetch error:', err);
                alert('An error occurred. Please try again.');
            }
        });

        // Add interactivity for search input
        const searchInput = document.getElementById('searchInput');
        searchInput.addEventListener('input', async (e) => {
            const university = new URLSearchParams(window.location.search).get('university') || 'CUZ';
            const searchTerm = e.target.value;
            if (searchTerm.length > 0) {
                try {
                    const response = await fetch(`${API_URL}/home/${university}/search?name=${searchTerm}`, {
                        headers: { 'Authorization': `Bearer ${localStorage.getItem('token')}` }
                    });
                    if (!response.ok) throw new Error('Search failed');
                    const data = await response.json();
                    updatePropertyGrid(data);
                } catch (err) {
                    console.error(`Search error: ${err.message}`);
                }
            } else {
                fetchBoardingHouses(university); // Reload all if search is cleared
            }
        });

        // Add interactivity for filter button
        const filterBtn = document.getElementById('filterBtn');
        filterBtn.addEventListener('click', () => {
            alert('Filter options opened');
        });

        // Update property grid with search or filter results
        function updatePropertyGrid(data) {
            const propertyGrid = document.getElementById('propertyGrid');
            const noBoardingHouses = document.getElementById('noBoardingHouses');
            const error = document.getElementById('error');

            propertyGrid.innerHTML = '<div class="loading" id="loading">Loading properties...</div>';

            if (data.length === 0) {
                noBoardingHouses.style.display = 'block';
            } else {
                noBoardingHouses.style.display = 'none';
                error.style.display = 'none';
                propertyGrid.innerHTML = '';
                data.forEach(boardinghouse => {
                    const card = document.createElement('div');
                    card.className = 'property-card';
                    card.innerHTML = `
                        <div class="property-image"></div>
                        <div class="property-details">
                            <h3>${boardinghouse.name}</h3>
                            <p>Location: ${boardinghouse.location}</p>
                            <p>Gender: ${boardinghouse.gender || 'Not specified'}</p>
                            <p class="price">Price: N/A</p>
                        </div>
                    `;
                    propertyGrid.appendChild(card);
                });
            }
            document.getElementById('loading').style.display = 'none';
        }
    </script>
</body>
</html>
